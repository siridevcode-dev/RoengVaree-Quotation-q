version: '3.8'

services:
  roengvaree-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roengvaree-quotation
    restart: always
    ports:
      - "3000:3000"
    volumes:
      # Map the NAS folder to the app data folder
      # Ensure the local folder path exists on your Synology NAS
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT:-3000}
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
